<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bahnhofs-Kiosk-Display</title>

    <style>
        /* Basis-Einstellungen für den gesamten Bildschirm */
        html, body {
            margin: 0;
            padding: 0;
            background-color: rgb(94, 92, 92); /* Dein augenschonendes Dunkelgrau */
            font-family: "arial", sans-serif;
            height: 100vh;
        }

        /* DIE GANZE SEITE PASST SICH HIER AUTOMATISCH AN */
        body {
            display: flex;
            flex-direction: row;
            justify-content: center;
            flex-wrap: wrap; /* Schiebt die Uhr auf dem Handy automatisch nach unten */
            gap: 20px;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto; /* Erlaubt Scrollen auf kleinen Handy-Bildschirmen */
        }

        /* Beide Bereiche teilen sich am PC den Platz, wachsen und schrumpfen flexibel */
        .anzeige-bereich, .uhr-bereich {
            flex: 1; 
            min-width: 300px; /* Verhindert, dass es zu schmal gequetscht wird */
            height: calc(100vh - 40px); /* Nutzt die verfügbare Höhe abzüglich Padding */
            box-sizing: border-box;
        }

        /* Auf dem Handy wird die Höhe angepasst, damit man scrollen kann */
        @media (max-width: 900px) {
            .anzeige-bereich, .uhr-bereich {
                height: auto;
                min-height: 50vh;
            }
        }

        /* Container für die linke Live-Abfahrtstafel */
        .anzeige-bereich {
            border-radius: 15px;
            overflow: hidden;
            border: 4px solid #1a1a1a;
        }

        /* Das iFrame füllt den Bereich flexibel aus */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Container für die rechte Uhr-Seite */
        .uhr-bereich {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Der blaue Rahmen passt sich jetzt prozentual an die verfügbare Breite an */
        .uhr-container {
            position: relative;
            background-color: rgb(204, 196, 196); /* Ziffernblatt-Grau */
            border: 14px solid rgb(6, 6, 168);   
            border-radius: 30px;
            padding: 20px;
            box-sizing: border-box;
            
            /* Keine festen Pixel mehr! Die Uhr skaliert flexibel mit dem Inhalt */
            max-width: 100%;
            width: 600px; /* Maximale Wunschgröße auf großen Monitoren */
            aspect-ratio: 1 / 1; /* Zwingt den Container, immer ein perfektes Quadrat zu bleiben */
        }

        /* Die SVG-Uhr füllt den Container zu 100% aus */
        object {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Das DB-Logo bleibt prozentual immer exakt unter der 12 sitzen */
        .uhr-logo {
            position: absolute;
            top: 17.5%; 
            left: 50%;
            transform: translate(-50%, -50%); 
            height: 7%; /* Skaliert perfekt mit der Größe des Containers */
            background-color: rgb(204, 196, 196); 
            z-index: 10; 
        }
    </style>
</head>

<body>

    <!-- LINKS: Die originale DB-Tafel mit deinem exakten Link -->
    <div class="anzeige-bereich">
        <iframe src="https://iris.noncd.db.de/wbt/js/index.html?impressum=0&termsofuse=0&typ=ab&style=ab&zeilen=10&bhf=8000016"></iframe>
    </div>

    <!-- RECHTS: Deine Uhr -->
    <div class="uhr-bereich">
        <div class="uhr-container">
            <img id="logo-0-0" alt="Logo Bahn" class="uhr-logo" src="image/Logo.gif">

            <!-- width="100%" height="100%" sorgt dafür, dass das SVG flexibel wird -->
            <object type="image/svg+xml" data="image/stationclock.svg" >
                <param name="dial"               value="din41091.1"/>
                <param name="hourHand"           value="german"/>
                <param name="minuteHand"         value="german"/>
                <param name="secondHand"         value="german"/>
                <param name="axisCover"          value="circle"/>
                <param name="minuteHandBehavior" value="stepping"/>
                <param name="secondHandBehavior" value="swinging"/>
                <param name="secondHandStopTime" value="1.5"/>
                <param name="backgroundColor"    value="transparent"/>
                <param name="dialColor"          value="#212121"/>
                <param name="hourHandColor"      value="#212121"/>
                <param name="minuteHandColor"    value="#212121"/>
                <param name="secondHandColor"    value="#d11e00"/>
                <param name="axisCoverColor"     value="#232323"/>
                <param name="axisCoverRadius"    value="8"/>
                <param name="shadowOpacity"      value="0.5"/>
                <param name="shadowOffsetX"      value="3"/>
                <param name="shadowOffsetY"      value="3"/>
                <param name="shadowBlurring"     value="1"/>
            </object>
        </div>
    </div>

</body>
</html>
